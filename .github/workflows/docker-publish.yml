name: Docker Build and Publish (Native Multi-Arch)

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ========================================================
  # JOB 1 : Builds natifs en parallèle (AMD64 et ARM64)
  # ========================================================
  build-native:
    name: Build ${{ matrix.arch }} - ${{ matrix.image_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            image_suffix: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - arch: amd64
            runner: ubuntu-latest
            image_suffix: backend-worker
            context: ./backend
            dockerfile: ./backend/Dockerfile-worker
          - arch: amd64
            runner: ubuntu-latest
            image_suffix: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

          - arch: arm64
            runner: ubuntu-24.04-arm
            image_suffix: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - arch: arm64
            runner: ubuntu-24.04-arm
            image_suffix: backend-worker
            context: ./backend
            dockerfile: ./backend/Dockerfile-worker
          - arch: arm64
            runner: ubuntu-24.04-arm
            image_suffix: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=tag,suffix=-${{ matrix.arch }}
            type=sha,format=long,suffix=-${{ matrix.arch }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.image_suffix }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image_suffix }}-${{ matrix.arch }}

  # ========================================================
  # JOB 2 : Fusion des manifests (Multi-Arch)
  # - alpha/beta/rc : tag exact uniquement
  # - stable : tags semver + latest
  # ========================================================
  merge-manifests:
    name: Merge Manifests - ${{ matrix.image_suffix }}
    runs-on: ubuntu-latest
    needs: build-native
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        image_suffix: [ backend, backend-worker, frontend ]

    steps:
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release type
        id: release
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)[0-9]+$ ]]; then
            echo "kind=prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "kind=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ steps.release.outputs.kind == 'stable' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.release.outputs.kind == 'stable' }}
            type=semver,pattern={{major}},enable=${{ steps.release.outputs.kind == 'stable' }}
            type=raw,value=latest,enable=${{ steps.release.outputs.kind == 'stable' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Create and push Multi-Arch Manifest
        run: |
          IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image_suffix }}" | tr '[:upper:]' '[:lower:]')
          TAG_LIST=$(echo "${{ steps.meta.outputs.tags }}" | xargs -I {} echo "-t {}" | xargs)

          docker buildx imagetools create $TAG_LIST \
            $IMAGE_NAME:sha-${{ github.sha }}-amd64 \
            $IMAGE_NAME:sha-${{ github.sha }}-arm64